services:
  postgres:
    image: postgres:18-alpine
    container_name: ott-video-tech-demo-postgres
    environment:
      POSTGRES_DB: ott_video_demo
      POSTGRES_USER: ott_demo
      POSTGRES_PASSWORD: ott_demo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ott_demo -d ott_video_demo"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Real Temporal cluster, persisted in the same Postgres instance.
  # Switch the backend to it with `app.temporal.mode=remote`.
  # State survives backend restarts (unlike the embedded TestWorkflowEnvironment).
  temporal:
    image: temporalio/auto-setup:1.29.7
    container_name: ott-video-tech-demo-temporal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=ott_demo
      - POSTGRES_PWD=ott_demo
      - POSTGRES_SEEDS=postgres
      - DBNAME=temporal
      - VISIBILITY_DBNAME=temporal_visibility
    ports:
      - "7233:7233"
    healthcheck:
      # Use tctl, not "temporal operator cluster health". On 1.29.7 the
      # Spice CLI's health subcommand hits its internal gRPC deadline and
      # returns "context deadline exceeded" against a known-healthy
      # cluster (verified: tctl returns SERVING in 50ms, temporal operator
      # times out at 8s+ on the same socket). tctl is shipped in the
      # auto-setup image and is the recommended healthcheck for now.
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 30
      # auto-setup runs Postgres schema-setup before the frontend service
      # starts accepting traffic on :7233; allow up to 2 min for cold start.
      start_period: 120s

  temporal-ui:
    image: temporalio/ui:2.51.0
    container_name: ott-video-tech-demo-temporal-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8088
    ports:
      - "8088:8080"

volumes:
  postgres-data:
