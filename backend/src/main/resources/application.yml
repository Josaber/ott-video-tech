server:
  port: 8080

spring:
  application:
    name: ott-video-tech-demo-backend
  # Spring Boot reads multipart limits from spring.servlet.multipart.*,
  # NOT server.servlet.multipart.* (which silently does nothing). Without
  # this binding, Tomcat enforces its 1 MB internal default and any upload
  # bigger than that fails with FileSizeLimitExceededException as a 500.
  servlet:
    multipart:
      max-file-size: 512MB
      max-request-size: 512MB
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/ott_video_demo
    username: ott_demo
    password: ott_demo
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.format_sql: true
      hibernate.jdbc.lob.non_contextual_creation: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true

app:
  auth:
    jwt:
      # MUST be >= 32 bytes (HS256 / MACSigner requirement). Override via env in any non-local env.
      secret: ${JWT_SECRET:dev-only-secret-please-rotate-in-real-deployments-aaaaaaaaaaaa}
      issuer: ott-video-tech-demo
      ttl-hours: ${JWT_TTL_HOURS:24}
  # Signs viewer-bound license URLs embedded in HLS manifests. Deliberately
  # separate from app.auth.jwt.secret so a leak of either does not compromise
  # the other.
  license:
    signing-secret: ${LICENSE_SIGNING_SECRET:dev-only-license-signing-secret-please-rotate-aaaaaaaaaaaa}
    ttl-minutes: ${LICENSE_TTL_MINUTES:10}
  media:
    upload-dir: ${UPLOAD_DIR:./data/uploads}
    processed-dir: ${PROCESSED_DIR:./data/processed}
    ffmpeg-path: ${FFMPEG_PATH:ffmpeg}
    hls-segment-seconds: 4
    public-base-url: ${PUBLIC_BASE_URL:http://127.0.0.1:8080}
  ssai:
    ad-service-base-url: ${AD_SERVICE_BASE_URL:http://127.0.0.1:8090}
    # Legacy single-ad preroll fallback. Used only when preroll-pod is empty.
    ad-id: ${SSAI_AD_ID:preroll-brand-a}
    # 3-ad preroll pod — the typical OTT pattern (avoids repetition fatigue
    # by mixing 3 different creatives in one break).
    preroll-pod:
      - preroll-brand-a
      - preroll-brand-b
      - preroll-brand-c
    # One mid-roll break at the program halfway point.
    midroll-ad-id: preroll-brand-a
    midroll-position-fraction: 0.5
  cdn:
    # Empty = direct (segments served by backend /playback/). Set to a
    # cdn-service base URL to push segments through the mock edge with
    # signed URLs + CMCD logging.
    public-base-url: ${CDN_PUBLIC_BASE_URL:http://127.0.0.1:8095}
    signing-secret: ${CDN_SIGNING_SECRET:dev-only-cdn-signing-secret-please-rotate-aaaaaaaaaaaa}
    ttl-minutes: ${CDN_TTL_MINUTES:10}
  playback:
    # Concurrent streams per user. The hard-coded default in
    # PlaybackProperties is 2 (mirrors a typical OTT plan); dev relaxes
    # to 10 so multiple browser tabs / windows aren't blocked while
    # demoing the player. Override per environment with the env var.
    concurrent-stream-limit: ${PLAYBACK_CONCURRENT_STREAM_LIMIT:10}
    heartbeat-stale-seconds: ${PLAYBACK_HEARTBEAT_STALE_SECONDS:90}
  temporal:
    mode: ${APP_TEMPORAL_MODE:embedded}
    task-queue: vod-publishing
    remote:
      target: ${APP_TEMPORAL_TARGET:127.0.0.1:7233}
      namespace: ${APP_TEMPORAL_NAMESPACE:default}

logging:
  level:
    com.example.vod: INFO
    io.temporal: WARN
